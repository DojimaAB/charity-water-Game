<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>The Purifier | charity: water</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="game-shell">
    <header class="top-bar">
        <a class="jerry-icon" aria-label="Game brand" href="https://www.charitywater.org/" target="_blank">
          <img src="img/water-can-transparent.png" alt="Water can icon" />
        </a>

      <div class="status-display">
        <div class="timer-block">
          <p class="timer-label">TIME LEFT</p>
          <span class="timer-value" id="timerValue">-</span>
        </div>
        <button class="pause-btn" id="pauseBtn" type="button">
            <img src="img/pausebutton.png" alt="Pause icon"/>
        </button>
      </div>
    </header>

    <main class="content-box" aria-label="Main content area with interactive droplets">
      <div class="start-setup" id="startSetup">
        <p class="difficulty-label">MISSION DIFFICULTY</p>
        <div class="difficulty-options" role="group" aria-label="Select game difficulty">
          <button class="difficulty-option is-active" type="button" data-difficulty="easy" aria-pressed="true">EASY</button>
          <button class="difficulty-option" type="button" data-difficulty="medium" aria-pressed="false">MEDIUM</button>
          <button class="difficulty-option" type="button" data-difficulty="hard" aria-pressed="false">HARD</button>
        </div>

        <!-- Start button that initializes the game -->
        <button id="startBtn" class="start-button" type="button">START MISSION</button>
      </div>
      <!-- Dirty droplets will be spawned dynamically by JavaScript -->
    </main>

    <footer class="bottom-bar">
      <div class="profile-ring">
        <img src="img/pfp.png" alt="Purifier profile" />
      </div>
      <div class="bottom-content">
        <p class="machine-label">THE PURIFIER</p>
        <div class="statValues">
            <p class="stat-line score-line"><span class="scoreTitle">SCORE:</span><span id="scoreValue" class="scoreValue">-</span></p>
          <p class="stat-line impurities-line"><span class="impuritiesTitle">IMPURITIES:</span><span class="impuritiesValueGroup"><span id="impuritiesValue" class="scoreValue">-</span>/<span id="totalImpuritiesValue" class="scoreValue">-</span></span></p>
        </div>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
