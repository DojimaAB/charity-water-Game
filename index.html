<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>The Purifier</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="game-shell">
    <header class="top-bar">
        <button class="jerry-icon" aria-label="Game brand">
          <img src="img/water-can-transparent.png" alt="Water can icon" />
        </button>

      <div class="status-display">
        <div class="timer-block">
          <p class="timer-label">TIME LEFT</p>
          <span class="timer-value" id="timerValue">30.00</span>
        </div>
        <button class="pause-btn" id="pauseBtn" type="button">
            <img src="img/pausebutton.png" alt="Pause icon"/>
        </button>
      </div>
    </header>

    <main class="content-box" aria-label="Main content placeholder">
      <div class="content-placeholder">
        <p class="placeholder-title">Main content area</p>
        <p class="placeholder-copy">Top and bottom sections will fill the page while the game area is added later.</p>
      </div>
    </main>

    <footer class="bottom-bar">
      <div class="profile-ring">
        <img src="img/pfp.png" alt="Purifier profile" />
      </div>
      <div class="bottom-content">
        <p class="machine-label">THE PURIFIER</p>
        <div class="statValues">
            <p class="stat-line">SCORE: <span id="scoreValue" class="scoreValue">0</span></p>
            <p class="stat-line">IMPURITIES LEFT: <span id="impuritiesValue" class="scoreValue">0</span>/<span id="totalImpuritiesValue" class="scoreValue">10</span></p>
        </div>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
